name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Verify release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install version-check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install packaging setuptools
          python -m pip install -e .
      - name: Verify tag, versions, and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TAG_VERSION="$TAG_VERSION" python - <<'PY'
          import os

          from packaging.version import Version

          tag_version = os.environ["TAG_VERSION"]
          assert str(Version(tag_version)) == tag_version
          PY
          test "$(python setup.py --version)" = "${TAG_VERSION}"
          test "$(python -c 'import openpyxl; print(openpyxl.__paper_version__)')" = "${TAG_VERSION}"
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "${GITHUB_SHA}" refs/remotes/origin/main

  gates:
    name: Run supported compatibility gates
    needs: preflight
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  pypi:
    name: Publish tested distributions to PyPI
    needs: gates
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download tested distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-distributions-${{ github.sha }}
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
